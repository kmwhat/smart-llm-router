name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q smart_llm_router

  package-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -c "import glob, tarfile; p=glob.glob('dist/*.tar.gz')[0]; n=set(tarfile.open(p).getnames()); assert any(x.endswith('/examples/golden-sets/qa-public-v1.json') for x in n); assert any(x.endswith('/examples/task_contract.example.json') for x in n)"
      - run: python -m venv /tmp/router-smoke
      - run: /tmp/router-smoke/bin/python -m pip install dist/*.whl
      - run: /tmp/router-smoke/bin/smart-llm-router --help
      - run: /tmp/router-smoke/bin/smart-llm-router score "audit release packaging" --task audit
      - run: /tmp/router-smoke/bin/python -c "from importlib.metadata import metadata; m = metadata('smart-llm-router'); assert m['License-Expression'] == 'Apache-2.0'; assert m['Requires-Python'] == '>=3.10'"
